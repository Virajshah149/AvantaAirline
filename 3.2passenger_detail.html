<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passenger Details | Avanta Airlines</title>
  <link rel="stylesheet" href="3.2passenger_details.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <header class="header">
    <h1>Passenger Information</h1>
    <p>Please fill in all the required details to proceed</p>
  </header>

  <section class="form-container">
    <form class="details-form">
      <div class="form-group">
        <label>Full Name*</label>
        <input type="text" required />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Email*</label>
          <input type="email" required />
        </div>
        <div class="form-group">
          <label>Mobile Number*</label>
          <input type="tel" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Gender*</label>
          <select required>
            <option value="">Select</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date of Birth*</label>
          <input type="date" required />
        </div>
      </div>

      <div class="form-group">
        <label>Nationality*</label>
        <input type="text" required />
      </div>

      <div class="form-group">
        <label>Aadhaar/Passport Number*</label>
        <input type="text" required />
      </div>

      <div class="form-group">
        <label>Full Address*</label>
        <textarea rows="3" required></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Emergency Contact*</label>
          <input type="tel" required />
        </div>
        <div class="form-group">
          <label>Frequent Flyer No.</label>
          <input type="text" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Meal Preference</label>
          <select>
            <option>No Preference</option>
            <option>Veg</option>
            <option>Non-Veg</option>
            <option>Jain Meal</option>
            <option>Vegan</option>
          </select>
        </div>
        <div class="form-group">
          <label>Special Assistance</label>
          <select>
            <option>No</option>
            <option>Wheelchair</option>
            <option>Medical</option>
            <option>Hearing/Visual</option>
          </select>
        </div>
      </div>

      <button type="submit" class="submit-btn">Proceed to Payment</button>
    </form>
  </section>
  <footer class="seat-footer">
    <p>Need help? <a href="#">Contact Support</a></p>
  </footer>
  <script src="3.2.js"></script>
</body>
</html>
