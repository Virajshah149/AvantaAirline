<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Edit Profile - Avanta Airlines</title>
  <link rel="stylesheet" href="5.1.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Edit Profile</h1>
      <a href="5.0.html" class="back-btn">← Back</a>
    </header>

    <form class="edit-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" value="Viraj Shah" />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" value="viraj@email.com" />
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="text" id="phone" value="+91 98765 43210" />
      </div>

      <div class="form-group">
        <label for="flyer">Frequent Flyer Number</label>
        <input type="text" id="flyer" value="AV1234567" />
      </div>

      <div class="form-group">
        <label for="meal">Meal Preference</label>
        <select id="meal">
          <option selected>Vegetarian</option>
          <option>Non-Vegetarian</option>
          <option>Vegan</option>
        </select>
      </div>

      <div class="form-group">
        <label for="seat">Seat Preference</label>
        <select id="seat">
          <option selected>Aisle</option>
          <option>Window</option>
          <option>Middle</option>
        </select>
      </div>

      <div class="form-group">
        <label for="notifications">Notifications</label>
        <select id="notifications">
          <option selected>Enabled</option>
          <option>Disabled</option>
        </select>
      </div>

      <button type="submit" class="save-btn">Save Changes</button>
    </form>
  </div>
  <script src="5.1.js"></script>
</body>
</html>
