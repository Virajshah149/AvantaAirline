<!DOCTYPE html>
<html>
<head>
  <title>Avanta Admin Login</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #06152b;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      width: 360px;
      background: #0b2345;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
      text-align: center;
    }

    h2 {
      color: #ffd700;
      margin-bottom: 25px;
    }

    input {
      width: 92%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 8px;
      background: #ffd700;
      color: #06152b;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #e6c200;
    }

    #msg {
      color: #ff6b6b;
      margin-top: 15px;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Avanta Admin Login</h2>

    <input type="text" id="adminUsername" placeholder="Admin Username">
    <input type="password" id="adminPassword" placeholder="Admin Password">

    <button onclick="adminLogin()">Login</button>

    <p id="msg"></p>
  </div>

  <script src="admin.js"></script>
</body>
</html>
